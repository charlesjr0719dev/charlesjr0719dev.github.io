<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charles Yang</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  :root {
    --canvas: #f4f3f1;
    --text: #333333;
    --text-dim: #aaaaaa;
    --shadow: rgba(90,50,40,0.15) 0px 5px 15px 0px, rgba(80,40,30,0.1) 0px 4px 8px 0px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: system-ui, 'Helvetica Neue', 'Segoe UI', Arial, 'PingFang TC', sans-serif;
    background: var(--canvas);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .page {
    text-align: center;
    padding: 40px;
  }

  h1 {
    font-family: 'Cormorant Garamond', Georgia, 'Times New Roman', serif;
    font-size: 36px;
    font-weight: 300;
    letter-spacing: 0.08em;
    margin-bottom: 32px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
    align-items: center;
  }

  .links a {
    font-size: 15px;
    color: var(--text-dim);
    text-decoration: none;
    transition: color 0.2s ease;
  }

  .links a:hover {
    color: var(--text);
  }

  footer {
    position: fixed;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 14px;
    color: var(--text-dim);
  }
</style>
</head>
<body>
<div class="page">
  <h1>Charles Yang</h1>
  <div class="links">
  </div>
</div>
<footer>2026</footer>
</body>
</html>
